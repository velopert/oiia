<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oiiai Keyboard</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="keyhelp" class="keyhelp" hidden>
      <div class="keyhelp-card">
        <div class="keyhelp-title">단축키</div>
        <div class="keyhelp-grid">
          <kbd>ㅜ</kbd><span>N · o 음절</span>
          <kbd>ㅣ</kbd><span>L · i 음절</span>
          <kbd>ㅏ</kbd><span>K · a 음절</span>
          <kbd>A</kbd><span>고양이 팝 + A 슬롯 오디오</span>
          <kbd>B</kbd><span>B 슬롯 오디오</span>
          <kbd>1–9</kbd><span>DJ 이펙트 슬롯</span>
          <kbd>Space</kbd><span>원곡 전체 재생</span>
          <kbd>Tab</kbd><span>구간 순환 선택</span>
          <kbd>꾹 누르기</kbd><span>EDM 빌드업 → 드롭</span>
          <kbd>?</kbd><span>이 창 토글</span>
          <kbd>Esc</kbd><span>이 창 닫기</span>
        </div>
        <div class="keyhelp-close">클릭/Esc/? 로 닫기</div>
      </div>
    </div>
    <div id="start-hint" class="start-hint">
      <div class="start-hint-inner">
        <div class="start-jamo">ㅜㅣㅣㅏ</div>
        <div class="start-text">아무 키나 눌러서 시작</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
