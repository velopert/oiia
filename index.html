<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Oiiai" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/oia-uia.gif" />
    <link rel="apple-touch-icon" href="/oia-uia.gif" />
    <title>Oiiai Keyboard</title>
    <meta name="description" content="The viral oiiai cat keyboard with DJ effects." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Oiiai Keyboard" />
    <meta property="og:description" content="The viral oiiai cat keyboard with DJ effects." />
    <meta property="og:image" content="/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oiiai Keyboard" />
    <meta name="twitter:description" content="The viral oiiai cat keyboard with DJ effects." />
    <meta name="twitter:image" content="/og.png" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5Z8YL7SW9T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5Z8YL7SW9T');
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div id="keyhelp" class="keyhelp" hidden>
      <div class="keyhelp-card">
        <div class="keyhelp-title">단축키</div>
        <div class="keyhelp-grid">
          <kbd>ㅜ</kbd><span>N · o 음절</span>
          <kbd>ㅣ</kbd><span>L · i 음절</span>
          <kbd>ㅏ</kbd><span>K · a 음절</span>
          <kbd>Q</kbd><span>A 샘플 + 고양이 팝</span>
          <kbd>W</kbd><span>B 샘플 + 슬로우모션 고양이</span>
          <kbd>E</kbd><span>C 샘플 + 회전 고양이</span>
          <kbd>1–9</kbd><span>DJ 이펙트 슬롯</span>
          <kbd>0</kbd><span>랜덤 DJ 슬롯</span>
          <kbd>Space</kbd><span>원곡 전체 재생</span>
          <kbd>Tab</kbd><span>구간 순환 선택</span>
          <kbd>꾹 누르기</kbd><span>EDM 빌드업 → 드롭</span>
          <kbd>Cmd/Ctrl+Z</kbd><span>세그먼트 편집 되돌리기</span>
          <kbd>?</kbd><span>이 창 토글</span>
          <kbd>Esc</kbd><span>이 창 닫기 / 루프·DJ 전체 정지</span>
        </div>
        <div class="keyhelp-stats" id="keyhelp-stats"></div>
        <div class="keyhelp-actions">
          <button id="replay-tour" class="keyhelp-action">🎯 튜토리얼 다시 보기</button>
          <a href="/blog/" class="keyhelp-action" id="open-devlog">📓 개발일지</a>
          <button id="reset-storage" class="keyhelp-action danger" title="모든 설정 초기화">🗑 전체 초기화</button>
        </div>
        <label class="keyhelp-intensity">
          FX 강도
          <input type="range" id="fx-intensity" min="0.2" max="1.8" step="0.05" value="1">
          <span id="fx-intensity-val">1.0×</span>
        </label>
        <div class="keyhelp-close">클릭/Esc/? 로 닫기</div>
      </div>
    </div>
    <div id="tour" class="tour" role="dialog" aria-modal="false" aria-labelledby="tour-title" aria-describedby="tour-body" hidden>
      <div class="tour-bubble">
        <div class="tour-step"><span id="tour-n">1</span>/<span id="tour-total">3</span></div>
        <div class="tour-title" id="tour-title"></div>
        <div class="tour-body" id="tour-body"></div>
        <div class="tour-btns">
          <button id="tour-skip" class="tour-skip">건너뛰기</button>
          <button id="tour-next" class="tour-next">다음 →</button>
        </div>
      </div>
      <div id="tour-arrow" class="tour-arrow" aria-hidden="true"></div>
    </div>
    <div id="start-hint" class="start-hint">
      <div class="start-hint-inner">
        <div class="start-jamo">ㅜㅣㅣㅏ</div>
        <button id="start-hint-btn" class="start-hint-btn" type="button">시작하기</button>
        <div class="start-text">또는 아무 키나 눌러서 시작</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
